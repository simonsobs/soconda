
{% set version = "3.0.0a42" %}

{% set build = 0 %}

package:
  name: toast
  version: {{ version }}

source:
  git_url: https://github.com/hpc4cmb/toast.git
  git_rev: {{ version }}

build:
  skip: True  # [py<39]
  skip: True  # [win]
  number: {{ build }}
  string: "py{{ py }}h{{ PKG_HASH }}_{{ build }}"

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - make
    - llvm-openmp # [osx]
  host:
    - llvm-openmp # [osx]
    - libgomp # [linux]
    - libopenblas * *openmp*
    - libblas * *openblas
    - python
    - setuptools
    - pip
    - numpy
    - scipy
    - fftw
    - suitesparse
    - libaatm
  run:
    - llvm-openmp # [osx]
    - libopenblas * *openmp*
    - libblas * *openblas
    - {{ pin_compatible("scipy") }}
    - {{ pin_compatible("fftw") }}
    - {{ pin_compatible("libopenblas") }}
    - {{ pin_compatible("libblas") }}
    - {{ pin_compatible("suitesparse") }}
    - {{ pin_compatible("libaatm") }}
    - python
    - ruamel.yaml
    - matplotlib
    - astropy
    - healpy
    - h5py
    - ephem
    - tomlkit
    - traitlets >=5.0
    - psutil
    - pshmem >=1.3.3
    - wurlitzer
    - flacarray >=0.3.4

test:
  imports:
    - toast

about:
  home: https://github.com/hpc4cmb/toast
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  summary: 'Time Ordered Astrophysics Scalable Tools'
  description: |
    TOAST is a software framework for simulating and processing timestream data
    collected by microwave telescopes.
  dev_url: https://github.com/hpc4cmb/toast

extra:
  recipe-maintainers:
    - tskisner
