{% set version = "db0aee380dad503ba8fdf058d4d8075387100758" %}

{% set build = 0 %}

package:
  name: libactpol_deps
  version: {{ version }}

source:
  git_url: https://github.com/ACTCollaboration/libactpol_deps.git
  git_rev: {{ version }}
  patches:
    - gcc_hardcode.patch
    - implicit_func.patch

build:
  number: {{ build }}
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}
    - llvm-openmp # [osx]
    - automake
    - autoconf
    - m4
    - libtool
    - make
  host:
    - llvm-openmp # [osx]
    - libgomp # [linux]
    - libopenblas * *openmp*
    - libblas * *openblas
    - zziplib
  run:

test:
  commands:
    - ls $PREFIX/lib  # [not win]
    - test -f $PREFIX/lib/libslim${SHLIB_EXT}  # [not win]

about:
  home: https://github.com/ACTCollaboration/libactpol_deps
  license: GPL-3
  license_family: GPL
  license_file: LICENSE
  summary: Dependencies for libactpol.
  description: |
    This is a conda package for libactpol_deps
  dev_url: https://github.com/ACTCollaboration/libactpol_deps

extra:
  recipe-maintainers:
    - tskisner
