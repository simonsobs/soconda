{% set version = "0.13.72" %}

{% set build = 0 %}

package:
  name: zziplib
  version: {{ version }}

source:
  git_url: https://github.com/gdraheim/zziplib.git
  git_rev: v{{ version }}

build:
  number: {{ build }}
  skip: true  # [win]
  run_exports:
    - zziplib

requirements:
  build:
    - {{ compiler('c') }}
    - cmake
    - make
    - zlib
  host:
    - zlib
  run:
    - zlib

test:
  commands:
    - ls $PREFIX/lib  # [not win]
    - test -f $PREFIX/lib/libzzip${SHLIB_EXT}  # [not win]

about:
  home: https://github.com/gdraheim/zziplib
  license: GPL-2
  license_family: GPL
  license_file: LICENSE
  summary: Read access to zip files in zip-archive format.
  description: |
    This is a conda package for zziplib, which provides POSIX file access
    to zip archives.
  dev_url: https://github.com/gdraheim/zziplib

extra:
  recipe-maintainers:
    - tskisner
